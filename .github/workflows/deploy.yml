name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Test connection
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "echo '✅ Connected as:' && whoami"

      - name: Deploy
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
          set -e
          cd ${{ secrets.SERVER_PATH }}

          git fetch origin main
          git reset --hard origin/main

          npm ci --prefer-offline || npm ci

          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run build

          printf 'server {\n    listen 80;\n    listen [::]:80;\n    server_name visionex.app www.visionex.app;\n    root ${{ secrets.SERVER_PATH }}/dist;\n    index index.html;\n    location / {\n        try_files $uri $uri/ /index.html;\n    }\n    gzip on;\n    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;\n}\n' | sudo tee /etc/nginx/sites-available/vision-bright-access > /dev/null

          sudo ln -sf /etc/nginx/sites-available/vision-bright-access /etc/nginx/sites-enabled/vision-bright-access
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl reload nginx

          echo "✅ Deployed successfully"
          EOF

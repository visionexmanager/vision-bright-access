name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}

            # Pull latest code
            git pull origin main

            # Install dependencies
            npm ci

            # Build
            npm run build

            # Configure nginx to serve the dist folder
            {
              echo 'server {'
              echo '    listen 80;'
              echo '    listen [::]:80;'
              echo '    server_name visionex.app www.visionex.app;'
              echo "    root ${{ secrets.SERVER_PATH }}/dist;"
              echo '    index index.html;'
              echo '    location / {'
              echo '        try_files $uri $uri/ /index.html;'
              echo '    }'
              echo '    gzip on;'
              echo '    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;'
              echo '}'
            } > /etc/nginx/sites-available/vision-bright-access

            # Enable the site
            ln -sf /etc/nginx/sites-available/vision-bright-access /etc/nginx/sites-enabled/vision-bright-access

            # Remove default site if exists
            rm -f /etc/nginx/sites-enabled/default

            # Test and reload nginx
            nginx -t && systemctl reload nginx

            echo "Deployed successfully"

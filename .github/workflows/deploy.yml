name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Sending deploy request to server..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "x-deploy-token: visionex-deploy-2024" \
            --max-time 15 \
            http://204.168.191.20:9000)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Response: $BODY (HTTP $HTTP_CODE)"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Deploy triggered successfully on server"

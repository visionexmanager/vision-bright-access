name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}

            # Pull latest code (discard any local changes first)
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies
            npm ci --prefer-offline || npm ci

            # Build (increased memory limit for large React bundles)
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm run build

            # Configure nginx (use sudo tee to write to protected directory)
            sudo tee /etc/nginx/sites-available/vision-bright-access > /dev/null << 'NGINX_EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name visionex.app www.visionex.app;
                root ${{ secrets.SERVER_PATH }}/dist;
                index index.html;
                location / {
                    try_files $uri $uri/ /index.html;
                }
                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
            }
            NGINX_EOF

            # Enable the site
            sudo ln -sf /etc/nginx/sites-available/vision-bright-access /etc/nginx/sites-enabled/vision-bright-access

            # Remove default site if exists
            sudo rm -f /etc/nginx/sites-enabled/default

            # Test nginx config then reload
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Deployed successfully to visionex.app"

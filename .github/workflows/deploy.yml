name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group:             deploy-${{ github.ref }}
  cancel-in-progress: false    # never cancel an active deployment

jobs:

  # ── 1. Deploy SPA to VPS (existing webhook) ───────────────────────────────────
  deploy-vps:
    name: Deploy SPA → VPS
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Sending deploy request to server..."

          for i in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "x-deploy-token: ${{ secrets.DEPLOY_TOKEN }}" \
              --max-time 20 \
              http://204.168.191.20:9000)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)

            echo "Attempt $i — Response: $BODY (HTTP $HTTP_CODE)"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deploy triggered successfully"
              break
            fi

            if [ "$i" = "3" ]; then
              echo "Deploy webhook failed after 3 attempts (last HTTP $HTTP_CODE)"
              exit 1
            fi

            echo "Retrying in 5 seconds..."
            sleep 5
          done

      - name: Wait for build
        run: |
          echo "Waiting 60 seconds for build + nginx reload..."
          sleep 60

      - name: Verify site is live
        run: |
          echo "Checking visionex.app..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://visionex.app)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Site is live! (HTTP $HTTP_CODE)"
          else
            echo "❌ Health check failed — HTTP $HTTP_CODE"
            exit 1
          fi

  # ── 2. Deploy Supabase Edge Functions ────────────────────────────────────────
  deploy-edge-functions:
    name: Deploy → Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Deploy changed Edge Functions
        run: bash scripts/deploy-changed-supabase-functions.sh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}

  # ── 3. Run pending DB migrations ──────────────────────────────────────────────
  # Always runs `db push` — every migration file uses `if not exists` / `if exists`
  # guards, so re-applying already-applied migrations is a safe no-op. A prior
  # diff-based gate here could silently skip backlog migrations whenever the
  # triggering commit didn't itself touch supabase/migrations/.
  run-migrations:
    name: Run DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push migrations to production
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ── 4. Build and push stream-proxy Docker image ────────────────────────────────
  deploy-stream-proxy:
    name: Build & push stream-proxy image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for stream-proxy changes
        id: changed
        run: |
          git fetch origin ${{ github.event.before }} 2>/dev/null || true
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null | grep "infra/stream-proxy/" || true)
          echo "has_changes=$([ -n "$CHANGED" ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.changed.outputs.has_changes == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changed.outputs.has_changes == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push stream-proxy
        if: steps.changed.outputs.has_changes == 'true'
        uses: docker/build-push-action@v6
        with:
          context:    infra/stream-proxy
          target:     production
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/stream-proxy:latest,ghcr.io/${{ github.repository_owner }}/stream-proxy:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms:  linux/amd64,linux/arm64

  # ── 5. Notify on any failure ───────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy-vps, deploy-edge-functions, run-migrations]
    if: failure()
    steps:
      - name: Slack alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          curl -sS --fail-with-body -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Visionex deployment FAILED on \`${{ github.ref_name }}\` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

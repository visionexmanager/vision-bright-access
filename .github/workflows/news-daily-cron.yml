name: Daily AI News Generation

on:
  schedule:
    # Every day at 06:00 UTC (9:00 AM Riyadh time)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-news:
    name: Generate & publish daily news
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate articles via OpenAI & save to Supabase
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node - <<'EOF'
          const OPENAI_API_KEY = process.env.OPENAI_API_KEY;
          const SUPABASE_URL   = process.env.SUPABASE_URL;
          const SUPABASE_KEY   = process.env.SUPABASE_KEY;

          const CATEGORIES = [
            { key: "breaking",      nameEn: "Breaking News",              nameAr: "أخبار عاجلة",              icon: "AlertTriangle" },
            { key: "technology",    nameEn: "Technology & Innovation",    nameAr: "التكنولوجيا والابتكار",    icon: "Cpu" },
            { key: "ai",            nameEn: "Artificial Intelligence",    nameAr: "الذكاء الاصطناعي",         icon: "Brain" },
            { key: "marketplace",   nameEn: "E-Commerce & Marketplace",   nameAr: "التجارة الإلكترونية",       icon: "ShoppingBag" },
            { key: "games",         nameEn: "Games & Entertainment",      nameAr: "الألعاب والترفيه",         icon: "Gamepad2" },
            { key: "academy",       nameEn: "Education & Training",       nameAr: "التعليم والتدريب",         icon: "GraduationCap" },
            { key: "health",        nameEn: "Health & Medicine",          nameAr: "الصحة والطب",              icon: "Heart" },
            { key: "legal",         nameEn: "Law & Rights",               nameAr: "القانون والحقوق",          icon: "Scale" },
            { key: "business",      nameEn: "Business & Economy",         nameAr: "الأعمال والاقتصاد",        icon: "TrendingUp" },
            { key: "travel",        nameEn: "Travel & Tourism",           nameAr: "السفر والسياحة",           icon: "Plane" },
            { key: "beauty",        nameEn: "Beauty & Lifestyle",         nameAr: "الجمال وأسلوب الحياة",     icon: "Sparkles" },
            { key: "sports",        nameEn: "Sports & Fitness",           nameAr: "الرياضة واللياقة",         icon: "Trophy" },
            { key: "music",         nameEn: "Music & Arts",               nameAr: "الموسيقى والفنون",         icon: "Music" },
            { key: "psychology",    nameEn: "Psychology & Mental Health", nameAr: "الصحة النفسية",            icon: "SmilePlus" },
            { key: "community",     nameEn: "Community & Social",         nameAr: "المجتمع والتواصل",         icon: "Globe" },
            { key: "accessibility", nameEn: "Accessibility",              nameAr: "إمكانية الوصول",           icon: "Accessibility" },
            { key: "platform",      nameEn: "Platform Updates",           nameAr: "تحديثات المنصة",           icon: "Rocket" },
            { key: "entertainment",  nameEn: "Live TV & Radio",            nameAr: "البث المباشر والترفيه",     icon: "Tv" },
            { key: "nutrition",      nameEn: "Nutrition & Wellness",       nameAr: "التغذية والعافية",          icon: "Apple" },
            { key: "world_economy",  nameEn: "World Economy",              nameAr: "الاقتصاد العالمي",          icon: "DollarSign" },
            { key: "world_politics", nameEn: "World Politics",             nameAr: "السياسة العالمية",          icon: "Landmark" },
          ];

          // RSS feeds mapped to each category for real-world news context
          const CATEGORY_RSS = {
            breaking:      ["https://feeds.bbci.co.uk/news/rss.xml", "https://feeds.reuters.com/reuters/topNews"],
            technology:    ["https://feeds.bbci.co.uk/news/technology/rss.xml", "https://techcrunch.com/feed/"],
            ai:            ["https://techcrunch.com/category/artificial-intelligence/feed/"],
            marketplace:   ["https://techcrunch.com/category/e-commerce/feed/", "https://feeds.bbci.co.uk/news/business/rss.xml"],
            games:         ["https://www.polygon.com/rss/index.xml"],
            academy:       ["https://feeds.bbci.co.uk/news/education/rss.xml"],
            health:        ["https://feeds.bbci.co.uk/news/health/rss.xml"],
            legal:         ["https://feeds.bbci.co.uk/news/politics/rss.xml"],
            business:      ["https://feeds.bbci.co.uk/news/business/rss.xml"],
            travel:        ["https://feeds.bbci.co.uk/news/world/rss.xml"],
            beauty:        ["https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml"],
            sports:        ["https://feeds.bbci.co.uk/news/sport/rss.xml"],
            music:         ["https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml"],
            psychology:    ["https://feeds.bbci.co.uk/news/health/rss.xml"],
            community:     ["https://feeds.bbci.co.uk/news/world/rss.xml"],
            accessibility: ["https://feeds.bbci.co.uk/news/health/rss.xml"],
            platform:      ["https://techcrunch.com/feed/"],
            entertainment:  ["https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml"],
            nutrition:      ["https://feeds.bbci.co.uk/news/health/rss.xml"],
            world_economy:  ["https://feeds.bbci.co.uk/news/business/rss.xml", "https://feeds.reuters.com/reuters/businessNews"],
            world_politics: ["https://feeds.bbci.co.uk/news/politics/rss.xml", "https://feeds.reuters.com/reuters/worldNews", "https://www.aljazeera.com/xml/rss/all.xml"],
          };

          // Fetch real headlines from RSS feeds (no API key needed)
          async function fetchHeadlines(urls, max = 5) {
            const headlines = [];
            for (const url of urls) {
              try {
                const res = await fetch(url, {
                  headers: { "User-Agent": "VisionexNews/1.0" },
                  signal: AbortSignal.timeout(7000),
                });
                if (!res.ok) continue;
                const xml = await res.text();
                // Match <title> tags inside <item> blocks
                const matches = [...xml.matchAll(/<item>[\s\S]*?<title>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/g)];
                for (const m of matches) {
                  const t = m[1].trim()
                    .replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">")
                    .replace(/&quot;/g, '"').replace(/&#39;/g, "'")
                    .replace(/<[^>]+>/g, "");
                  if (t.length > 15 && t.length < 300) headlines.push(t);
                  if (headlines.length >= max) return headlines;
                }
              } catch {
                // ignore failed feeds, try next
              }
            }
            return headlines;
          }

          async function openaiCall(prompt, maxTokens) {
            const res = await fetch("https://api.openai.com/v1/chat/completions", {
              method: "POST",
              headers: { Authorization: `Bearer ${OPENAI_API_KEY}`, "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [{ role: "user", content: prompt }],
                response_format: { type: "json_object" },
                temperature: 0.4,
                max_tokens: maxTokens,
              }),
            });
            if (!res.ok) throw new Error(`OpenAI ${res.status}: ${await res.text()}`);
            const data = await res.json();
            const parsed = JSON.parse(data.choices[0].message.content);
            return parsed.articles ?? parsed.translations ?? [];
          }

          async function main() {
            const now = new Date();
            const dateEn = now.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

            // Step 0: Fetch real-world headlines from RSS for all categories in parallel
            console.log("Step 0: Fetching real-world headlines from RSS feeds...");
            const headlineMap = {};
            await Promise.all(
              CATEGORIES.map(async (cat) => {
                const urls = CATEGORY_RSS[cat.key] ?? ["https://feeds.bbci.co.uk/news/world/rss.xml"];
                headlineMap[cat.key] = await fetchHeadlines(urls, 5);
              })
            );

            const totalHeadlines = Object.values(headlineMap).reduce((s, h) => s + h.length, 0);
            console.log(`Fetched ${totalHeadlines} real headlines across ${CATEGORIES.length} categories`);
            for (const cat of CATEGORIES) {
              const hs = headlineMap[cat.key] ?? [];
              if (hs.length > 0) console.log(`  [${cat.key}] ${hs[0]}`);
            }

            // Build category list with real headlines embedded as context
            const categoryList = CATEGORIES.map(c => {
              const hs = headlineMap[c.key] ?? [];
              const context = hs.length > 0
                ? `\n  Real headlines from today: ${hs.slice(0, 4).join(" | ")}`
                : "";
              return `"${c.key}": ${c.nameEn} / ${c.nameAr}${context}`;
            }).join("\n\n");

            // Step 1: Generate EN + AR articles grounded in real news
            console.log("Step 1: Generating EN+AR articles grounded in real headlines...");
            const prompt1 = [
              `You are a professional news editor for Visionex, a multilingual tech platform. Today is ${dateEn}.`,
              ``,
              `Write one news article per category. Each article MUST be based on the "Real headlines from today" provided — report on what is ACTUALLY happening in the world right now.`,
              ``,
              `Rules:`,
              `- If real headlines are listed for a category, your article MUST cover those actual events`,
              `- Do NOT invent or fabricate news stories`,
              `- If no headlines are available for a category, write a factual educational piece grounded in that topic`,
              `- Journalistic, neutral, informative tone`,
              `- For the "breaking" category specifically: pick the single most urgent, time-sensitive real headline available and write it as genuinely urgent breaking news, not routine coverage`,
              ``,
              `Categories with today's real-world context:`,
              categoryList,
              ``,
              `Return ONLY this JSON (no extra text):`,
              `{"articles":[{"category":"technology","en":{"title":"5-10 word title","description":"15-30 word summary","content":"2-3 paragraph article body, 120-200 words"},"ar":{"title":"عنوان","description":"ملخص","content":"نص المقال"}}]}`,
              ``,
              `Write one article for each of the ${CATEGORIES.length} categories listed above.`,
            ].join("\n");

            const enArArticles = await openaiCall(prompt1, 16000);
            const valid = enArArticles.filter(a => CATEGORIES.some(c => c.key === a.category) && a.en?.title && a.ar?.title);
            console.log(`Generated ${valid.length} valid articles`);

            // Step 2: Translate to 9 more languages
            console.log("Step 2: Translating to 9 languages...");
            let extraTranslations = {};
            try {
              const input = valid.map(a => ({ category: a.category, title: a.en.title, description: a.en.description }));
              const prompt2 = `Translate the following ${input.length} news article titles and descriptions from English into these 9 languages:
          - es (Spanish), de (German), pt (Portuguese), zh (Chinese Simplified), tr (Turkish), fr (French), ru (Russian), ur (Urdu), hi (Hindi)

          Articles:
          ${JSON.stringify(input)}

          Return ONLY this JSON (no extra text):
          {
            "translations": [
              {
                "category": "technology",
                "es": { "title": "...", "description": "..." },
                "de": { "title": "...", "description": "..." },
                "pt": { "title": "...", "description": "..." },
                "zh": { "title": "...", "description": "..." },
                "tr": { "title": "...", "description": "..." },
                "fr": { "title": "...", "description": "..." },
                "ru": { "title": "...", "description": "..." },
                "ur": { "title": "...", "description": "..." },
                "hi": { "title": "...", "description": "..." }
              }
            ]
          }`;
              const translations = await openaiCall(prompt2, 12000);
              for (const row of translations) {
                const cat = row.category;
                extraTranslations[cat] = { ...row };
                delete extraTranslations[cat].category;
              }
              console.log("Translations done");
            } catch(e) {
              console.warn("Translations failed (non-fatal):", e.message);
            }

            // Step 3: Build rows
            const rows = valid.map(a => ({
              title:        a.en.title,
              description:  a.en.description,
              content:      a.en.content,
              category:     a.category,
              icon_name:    CATEGORIES.find(c => c.key === a.category)?.icon ?? "Newspaper",
              published:    true,
              published_at: now.toISOString(),
              translations: {
                en: a.en,
                ar: a.ar,
                ...(extraTranslations[a.category] ?? {}),
              },
            }));

            // Step 4: Insert into Supabase
            console.log(`Step 3: Inserting ${rows.length} articles into Supabase...`);
            const res = await fetch(`${SUPABASE_URL}/rest/v1/news_articles`, {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "apikey": SUPABASE_KEY,
                "Content-Type": "application/json",
                "Prefer": "return=minimal",
              },
              body: JSON.stringify(rows),
            });

            if (!res.ok) {
              const err = await res.text();
              throw new Error(`Supabase insert failed ${res.status}: ${err}`);
            }

            console.log(`✅ Inserted ${rows.length} articles successfully`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Send newsletter via edge function
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          CRON_SECRET:   ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            "$SUPABASE_URL/functions/v1/news-generate?newsletter_only=true" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 60)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Newsletter HTTP $HTTP_CODE: $BODY"

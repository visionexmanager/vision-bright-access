name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group:            ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Type check & lint ─────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Lint changed TypeScript files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="${{ github.sha }}^"
          fi

          mapfile -t FILES < <(
            git diff --diff-filter=ACMR --name-only "$BASE_SHA" "${{ github.sha }}" -- \
              '*.ts' '*.tsx' | grep -vE '^(visionex-tv|supabase/functions)/' || true
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No root TypeScript files changed; skipping ESLint."
            exit 0
          fi

          printf 'Linting %s\n' "${FILES[@]}"
          npx eslint --quiet "${FILES[@]}"

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: coverage/
          retention-days: 7

  # ── 3. Stream proxy Docker image ─────────────────────────────────────────────
  docker-stream-proxy:
    name: Build stream-proxy image
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents:  read
      packages:  write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry:  ghcr.io
          username:  ${{ github.actor }}
          password:  ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/stream-proxy
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context:     infra/stream-proxy
          target:      production
          push:        true
          tags:        ${{ steps.meta.outputs.tags }}
          labels:      ${{ steps.meta.outputs.labels }}
          cache-from:  type=gha
          cache-to:    type=gha,mode=max
          platforms:   linux/amd64,linux/arm64

global:
  resolve_timeout:    5m
  slack_api_url:      "{{ env \"ALERTMANAGER_SLACK_WEBHOOK\" }}"
  pagerduty_url:      "https://events.pagerduty.com/v2/enqueue"

# Route tree — severity determines destination
route:
  group_by:       [alertname, namespace, severity]
  group_wait:     30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: slack-warnings

  routes:
  # Critical alerts → PagerDuty (on-call) + Slack
  - match:
      severity: critical
    receiver:       pagerduty-critical
    group_wait:     10s
    repeat_interval: 15m
    continue: true
  - match:
      severity: critical
    receiver: slack-critical

  # Billing alerts → dedicated billing channel
  - match_re:
      alertname: "Billing.*|.*Credit.*"
    receiver: slack-billing
    repeat_interval: 30m

  # Provider alerts → ops channel
  - match_re:
      alertname: "Provider.*|AllProviders.*"
    receiver: slack-providers

  # Regional alerts → escalate fast
  - match_re:
      alertname: "Region.*"
    receiver:       pagerduty-critical
    group_wait:     5s
    repeat_interval: 10m

receivers:
- name: slack-warnings
  slack_configs:
  - channel: "#visionex-alerts"
    title:   "⚠️ {{ .GroupLabels.alertname }}"
    text:    "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
    send_resolved: true

- name: slack-critical
  slack_configs:
  - channel: "#visionex-critical"
    title:   "🔴 CRITICAL: {{ .GroupLabels.alertname }}"
    text:    "{{ range .Alerts }}*{{ .Annotations.summary }}*\n{{ .Annotations.description }}\n{{ end }}"
    color:   "#FF0000"
    send_resolved: true

- name: slack-billing
  slack_configs:
  - channel: "#visionex-billing-alerts"
    title:   "💰 Billing Alert: {{ .GroupLabels.alertname }}"
    text:    "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
    send_resolved: true

- name: slack-providers
  slack_configs:
  - channel: "#visionex-providers"
    title:   "🤖 Provider Alert: {{ .GroupLabels.alertname }}"
    text:    "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
    send_resolved: true

- name: pagerduty-critical
  pagerduty_configs:
  - routing_key: "{{ env \"PAGERDUTY_ROUTING_KEY\" }}"
    description: "{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}"
    severity:    critical
    client:      "Visionex SRE"
    client_url:  "https://grafana.internal.visionex.ai"
    details:
      namespace:   "{{ .CommonLabels.namespace }}"
      region:      "{{ .CommonLabels.region }}"
      description: "{{ .CommonAnnotations.description }}"

inhibit_rules:
# If a service is down, suppress its latency/error rate alerts
- source_match:
    alertname: ServiceDown
  target_match_re:
    alertname: "High.*Latency|HighError.*"
  equal: [app, namespace]

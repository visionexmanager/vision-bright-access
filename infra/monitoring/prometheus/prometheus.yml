global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster:     visionex-prod
    environment: production

# Alertmanager
alerting:
  alertmanagers:
  - static_configs:
    - targets: ['alertmanager:9093']

# Alert rules
rule_files:
- /etc/prometheus/rules/*.yml

scrape_configs:
# ── Kubernetes API server
- job_name: kubernetes-apiservers
  kubernetes_sd_configs:
  - role: endpoints
  scheme: https
  tls_config:
    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
  relabel_configs:
  - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
    action: keep
    regex: default;kubernetes;https

# ── All pods with prometheus.io/scrape=true
- job_name: kubernetes-pods
  kubernetes_sd_configs:
  - role: pod
    namespaces:
      names: [visionex-ams, visionex-workers, visionex-monitoring, visionex-infra]
  relabel_configs:
  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
    action: keep
    regex: "true"
  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
    action: replace
    target_label: __metrics_path__
    regex: (.+)
  - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
    action: replace
    regex: ([^:]+)(?::\d+)?;(\d+)
    replacement: $1:$2
    target_label: __address__
  - source_labels: [__meta_kubernetes_namespace]
    action: replace
    target_label: namespace
  - source_labels: [__meta_kubernetes_pod_name]
    action: replace
    target_label: pod
  - source_labels: [__meta_kubernetes_pod_label_app]
    action: replace
    target_label: app

# ── Node exporters
- job_name: node-exporter
  kubernetes_sd_configs:
  - role: node
  relabel_configs:
  - action: labelmap
    regex: __meta_kubernetes_node_label_(.+)

# ── Redis exporter (sidecar pattern)
- job_name: redis
  static_configs:
  - targets: ['redis-exporter.visionex-infra:9121']
    labels:
      app: redis

# ── Visionex custom metrics — API Gateway
- job_name: visionex-api-gateway
  kubernetes_sd_configs:
  - role: pod
    namespaces:
      names: [visionex-ams]
  relabel_configs:
  - source_labels: [__meta_kubernetes_pod_label_app]
    action: keep
    regex: api-gateway
  metrics_path: /metrics
  scheme: http

# ── AI Workers
- job_name: visionex-ai-workers
  kubernetes_sd_configs:
  - role: pod
    namespaces:
      names: [visionex-workers]
  relabel_configs:
  - source_labels: [__meta_kubernetes_pod_label_tier]
    action: keep
    regex: worker
  metrics_path: /metrics

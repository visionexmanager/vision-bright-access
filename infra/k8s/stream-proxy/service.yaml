apiVersion: v1
kind: Service
metadata:
  name: stream-proxy
  namespace: visionex-tv
  labels:
    app: stream-proxy
  annotations:
    # Tells Prometheus to scrape this service
    prometheus.io/scrape: "true"
    prometheus.io/port:   "8080"
    prometheus.io/path:   "/metrics"
spec:
  type: ClusterIP
  selector:
    app: stream-proxy
  ports:
    - name:       http
      port:       80
      targetPort: 8080
      protocol:   TCP
---
# Ingress — maps regional subdomain to this service
# Replace <REGION> with: eu / me / us / apac
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stream-proxy-ingress
  namespace: visionex-tv
  annotations:
    kubernetes.io/ingress.class:                 "nginx"
    cert-manager.io/cluster-issuer:             "letsencrypt-production"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "10"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  tls:
    - hosts:
        - eu-proxy.visionex.tv   # change per region
      secretName: stream-proxy-tls
  rules:
    - host: eu-proxy.visionex.tv  # change per region
      http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: stream-proxy
                port:
                  number: 80

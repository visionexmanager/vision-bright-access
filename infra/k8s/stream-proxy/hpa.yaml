apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stream-proxy-hpa
  namespace: visionex-tv
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       stream-proxy

  minReplicas: 3
  maxReplicas: 20

  metrics:
    # Scale on CPU utilization — triggers at 60% average across pods
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 60

    # Scale on memory — triggers at 70% average
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      # React quickly to traffic spikes — add up to 4 pods per 60s
      stabilizationWindowSeconds: 30
      policies:
        - type:          Pods
          value:         4
          periodSeconds: 60
        - type:          Percent
          value:         100
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      # Scale down conservatively — wait 5 min to avoid flapping
      stabilizationWindowSeconds: 300
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 120
      selectPolicy: Min
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stream-proxy-pdb
  namespace: visionex-tv
spec:
  minAvailable: 2    # always keep at least 2 pods running during node drain / rollout
  selector:
    matchLabels:
      app: stream-proxy

---
# API Gateway — stateless, zero-downtime rolling deploy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: visionex-ams
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # hard zero-downtime guarantee
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9090"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values: [api-gateway]
            topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: api-gateway
      containers:
      - name: api-gateway
        image: gcr.io/visionex-prod/api-gateway:$(IMAGE_TAG)
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        - name: metrics
          containerPort: 9090
        env:
        - name: NODE_ENV
          value: production
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: visionex-secrets
              key: supabase-url
        - name: SUPABASE_SERVICE_KEY
          valueFrom:
            secretKeyRef:
              name: visionex-secrets
              key: supabase-service-key
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: visionex-secrets
              key: redis-url
        - name: REGION
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['topology.kubernetes.io/region']
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: visionex-secrets
              key: jwt-secret
        resources:
          requests:
            cpu:    "250m"
            memory: "512Mi"
          limits:
            cpu:    "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]   # drain in-flight requests
      serviceAccountName: visionex-api-sa
      imagePullSecrets:
      - name: gcr-credentials
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: visionex-api-sa
  namespace: visionex-ams
  annotations:
    iam.gke.io/gcp-service-account: visionex-api@visionex-prod.iam.gserviceaccount.com

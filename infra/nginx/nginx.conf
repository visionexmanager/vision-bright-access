# ─────────────────────────────────────────────────────────────────────────────
# Visionex TV — Regional Nginx Layer
#
# Sits in front of the stream-proxy pods. Responsibilities:
#  • TLS termination (cert-manager / Let's Encrypt)
#  • HLS segment caching (reduces upstream load + latency)
#  • Rate limiting (backup to app-level limiting)
#  • CORS headers for browser playback
#  • Access logging for analytics ingestion
#  • Upstream health-based routing
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Cache zones ─────────────────────────────────────────────
    # HLS segments (.ts files) — aggressive cache, segments are immutable
    proxy_cache_path /var/cache/nginx/segments
        levels=1:2
        keys_zone=hls_segments:20m
        max_size=4g
        inactive=60s
        use_temp_path=off;

    # HLS manifests (.m3u8) — short TTL for live stream freshness
    proxy_cache_path /var/cache/nginx/manifests
        levels=1:2
        keys_zone=hls_manifests:5m
        max_size=200m
        inactive=10s
        use_temp_path=off;

    # ── Rate limiting zones ───────────────────────────────────────
    # Per-IP: max 600 stream requests per minute
    limit_req_zone $binary_remote_addr zone=stream_req:20m rate=600r/m;
    # Per-IP: max 60 API/token requests per minute
    limit_req_zone $binary_remote_addr zone=api_req:10m    rate=60r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

    # ── Upstream: stream-proxy pods ───────────────────────────────
    upstream stream_proxy {
        least_conn;                              # route to least-loaded pod
        keepalive 64;                            # persistent connections to pods
        keepalive_requests 1000;
        keepalive_timeout  60s;

        # Kubernetes headless-service DNS resolution
        # Actual IPs are injected by k8s or set via env in docker-compose
        server stream-proxy-1:8080 max_fails=2 fail_timeout=10s;
        server stream-proxy-2:8080 max_fails=2 fail_timeout=10s backup;
    }

    # ── Common proxy settings ────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection "";            # enable keepalive to upstream
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    10s;

    # ── Logging ──────────────────────────────────────────────────
    log_format visionex_access '$remote_addr - [$time_iso8601] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct="$upstream_connect_time" '
        'uht="$upstream_header_time" urt="$upstream_response_time" '
        'cache="$upstream_cache_status" region="$http_x_proxy_region"';

    access_log /var/log/nginx/access.log visionex_access;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance tweaks ────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    gzip               on;
    gzip_types         application/vnd.apple.mpegurl  # .m3u8
                       application/x-mpegURL
                       text/plain text/xml application/json;
    gzip_min_length    256;
    server_tokens      off;

    # ── Main server block ─────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Internal health check (Kubernetes liveness probe hits this via cluster IP)
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","node":"nginx"}';
        }

        # Nginx stub status for Prometheus nginx_exporter
        location = /nginx-status {
            stub_status on;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            access_log off;
        }

        # ── HLS manifest proxy (/stream/:channelId) ──────────────
        location ~ ^/stream/[a-f0-9\-]{36}$ {
            limit_req      zone=stream_req burst=40 nodelay;
            limit_conn     stream_conn 8;

            # Cache manifests for 3 seconds (live stream update interval)
            proxy_cache             hls_manifests;
            proxy_cache_key         "$scheme$host$request_uri$http_authorization";
            proxy_cache_valid       200 3s;
            proxy_cache_valid       404 1s;
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            proxy_cache_lock_timeout 2s;

            add_header X-Cache-Status        $upstream_cache_status always;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Headers "authorization, content-type" always;

            proxy_pass http://stream_proxy;
        }

        # ── HLS segment proxy (/segment/*) ───────────────────────
        # Segments are immutable — cache aggressively for 30 seconds
        location ~ ^/segment/ {
            limit_req zone=stream_req burst=120 nodelay;

            proxy_cache         hls_segments;
            proxy_cache_key     "$scheme$host$request_uri";
            proxy_cache_valid   200 30s;
            proxy_cache_valid   404  5s;
            proxy_cache_use_stale error timeout;
            proxy_cache_lock    on;

            add_header X-Cache-Status       $upstream_cache_status always;
            add_header Cache-Control        "public, max-age=30" always;
            add_header Access-Control-Allow-Origin "*" always;

            proxy_pass http://stream_proxy;
        }

        # ── CORS preflight ───────────────────────────────────────
        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "authorization, content-type";
                add_header Access-Control-Max-Age       86400;
                add_header Content-Length 0;
                return 204;
            }

            limit_req  zone=api_req burst=10 nodelay;
            proxy_pass http://stream_proxy;
        }
    }
}

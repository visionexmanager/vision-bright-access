# Drop this file in /etc/nginx/conf.d/gzip-cache.conf
# Then run: sudo nginx -t && sudo systemctl reload nginx
#
# This applies gzip + asset caching globally to ALL server blocks,
# including the HTTPS (port 443) block.

# ── Gzip ──────────────────────────────────────────────────────────────
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_min_length   1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml
    font/woff2;

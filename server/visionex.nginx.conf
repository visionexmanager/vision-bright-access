server {
    listen 80;
    server_name visionex.app www.visionex.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name visionex.app www.visionex.app;

    # SSL — Let's Encrypt (paths from certbot)
    ssl_certificate     /etc/letsencrypt/live/visionex.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/visionex.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/visionex/dist;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Static assets — 1-year cache (Vite uses content-hash filenames) ─
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        access_log off;
    }

    # ── index.html — no cache so new deploys take effect immediately ────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        expires 0;
    }

    # ── SPA routing — send all routes to index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

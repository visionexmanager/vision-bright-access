version: "3.9"

# ── Visionex TV — Full backend stack ──────────────────────────────────────────
# Usage:
#   1. cp .env.example .env  &&  edit .env
#   2. docker compose up -d
#   3. docker compose logs -f backend

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       visionex_tv
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run all migrations on first start
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d visionex_tv"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5

  # ── NestJS Backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     runner
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:    production
      DB_HOST:     postgres
      DB_PORT:     "5432"
      REDIS_HOST:  redis
      REDIS_PORT:  "6379"
    ports:
      - "3000:3000"     # REST API + WebSocket gateway (/tv namespace)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:         ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval:     30s
      timeout:      5s
      retries:      3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:

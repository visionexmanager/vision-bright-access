name        = "visionex-tv-edge"
main        = "worker.js"
compatibility_date = "2024-09-01"
workers_dev = false
routes      = [
  { pattern = "tv.visionex.app/*",        zone_name = "visionex.app" },
  { pattern = "api.tv.visionex.app/*",    zone_name = "visionex.app" },
  { pattern = "stream.tv.visionex.app/*", zone_name = "visionex.app" },
  { pattern = "ws.tv.visionex.app/*",     zone_name = "visionex.app" },
]

# KV namespaces
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "REPLACE_WITH_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "REGION_HEALTH"
id      = "REPLACE_WITH_KV_NAMESPACE_ID_2"

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true

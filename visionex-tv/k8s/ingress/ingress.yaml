# NGINX Ingress Controller — routes external traffic
# Prerequisites: ingress-nginx + cert-manager installed in cluster
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: visionex-tv-ingress
  namespace: visionex-tv
  annotations:
    # NGINX settings
    kubernetes.io/ingress.class:                 "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"     # WebSocket keep-alive
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # WebSocket upgrade for Socket.io
    nginx.ingress.kubernetes.io/proxy-http-version:           "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

    # SSL — cert-manager auto-provisions TLS from Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps:        "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # CORS header for CDN preflight
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://tv.visionex.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Requested-With"
spec:
  tls:
    - hosts:
        - tv.visionex.app
        - api.tv.visionex.app
        - ws.tv.visionex.app
        - stream.tv.visionex.app
      secretName: visionex-tv-tls
  rules:
    # Frontend
    - host: tv.visionex.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: visionex-frontend
                port:
                  number: 80

    # Backend API
    - host: api.tv.visionex.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: visionex-tv-backend
                port:
                  number: 80

    # WebSocket — dedicated host to avoid timeout issues
    - host: ws.tv.visionex.app
      http:
        paths:
          - path: /tv
            pathType: Prefix
            backend:
              service:
                name: visionex-tv-backend
                port:
                  number: 3001

    # Stream Proxy
    - host: stream.tv.visionex.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: visionex-stream-proxy
                port:
                  number: 80
---
# cert-manager ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: visionexmanager@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

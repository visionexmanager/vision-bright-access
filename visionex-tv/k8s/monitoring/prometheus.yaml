apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: visionex-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        cluster: visionex-tv-prod
        region:  "${REGION}"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: visionex-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [visionex-tv]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

      - job_name: visionex-stream-proxy
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [visionex-tv]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_tier]
            action: keep
            regex: streaming

      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

  alerts.yaml: |
    groups:
      - name: visionex-tv.alerts
        interval: 30s
        rules:
          - alert: BackendDown
            expr: up{job="visionex-backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend pod {{ $labels.pod }} is down"

          - alert: StreamProxyHighLoad
            expr: rate(stream_proxy_active_streams[5m]) > 45
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Stream proxy approaching capacity ({{ $value }} streams)"

          - alert: HighBufferingRate
            expr: rate(player_buffer_events_total[5m]) / rate(player_sessions_total[5m]) > 0.15
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Buffering rate above 15%: {{ $value | humanizePercentage }}"

          - alert: APILatencyHigh
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "P95 API latency above 500ms"

          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Error rate above 1%: {{ $value | humanizePercentage }}"

          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="visionex-tv"}[15m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"

          - alert: RedisMemoryHigh
            expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Redis memory above 85%"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: visionex-monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--web.enable-lifecycle"
            - "--web.enable-admin-api"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu:    "200m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: visionex-monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: visionex-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind:     ClusterRole
  name:     prometheus
subjects:
  - kind:      ServiceAccount
    name:      prometheus-sa
    namespace: visionex-monitoring

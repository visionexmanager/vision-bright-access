# DO NOT commit real values. Use Sealed Secrets or External Secrets Operator in production.
# To apply: kubectl create secret generic visionex-tv-secrets -n visionex-tv --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: visionex-tv-secrets
  namespace: visionex-tv
type: Opaque
stringData:
  DATABASE_URL:        "postgresql://postgres:CHANGE_ME@postgres-svc:5432/visionex_tv"
  REDIS_URL:           "redis://redis-svc:6379"
  JWT_SECRET:          "CHANGE_ME_min_64_chars_random_string"
  JWT_REFRESH_SECRET:  "CHANGE_ME_min_64_chars_random_string_2"
  DB_PASSWORD:         "CHANGE_ME"
  CORS_ORIGIN:         "https://tv.visionex.app"

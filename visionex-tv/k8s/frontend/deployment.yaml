apiVersion: apps/v1
kind: Deployment
metadata:
  name: visionex-frontend
  namespace: visionex-tv
  labels:
    app: visionex-frontend
    tier: web
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: visionex-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: visionex-frontend
        tier: web
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: visionex-frontend
              topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: ghcr.io/visionexmanager/visionex-tv-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.tv.visionex.app"
            - name: NEXT_PUBLIC_WS_URL
              value: "https://ws.tv.visionex.app"
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: visionex-frontend
  namespace: visionex-tv
spec:
  selector:
    app: visionex-frontend
  ports:
    - name: http
      port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: visionex-frontend-hpa
  namespace: visionex-tv
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: visionex-frontend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageUtilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 5
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: visionex-frontend-pdb
  namespace: visionex-tv
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: visionex-frontend
